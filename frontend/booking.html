<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="booking.title">حجز موعد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>

<div id="site-header"></div>

<main class="main-content">
  <div class="container" style="max-width: 840px; padding-top:40px; padding-bottom:80px;">

    <div class="text-center" style="margin-bottom:32px;">
      <h1 style="font-size:2rem;" data-i18n="booking.title"></h1>
      <p data-i18n="booking.subtitle"></p>
    </div>

    <!-- Step indicator -->
    <div class="wizard-steps" id="wizard-steps">
      <div class="wizard-step" data-step="1"><span class="dot mono">1</span><span data-i18n="booking.stepDepartment"></span></div>
      <div class="wizard-connector"></div>
      <div class="wizard-step" data-step="2"><span class="dot mono">2</span><span data-i18n="booking.stepDoctor"></span></div>
      <div class="wizard-connector"></div>
      <div class="wizard-step" data-step="3"><span class="dot mono">3</span><span data-i18n="booking.stepDateTime"></span></div>
      <div class="wizard-connector"></div>
      <div class="wizard-step" data-step="4"><span class="dot mono">4</span><span data-i18n="booking.stepConfirm"></span></div>
    </div>

    <!-- Step 1: Department -->
    <section class="wizard-panel" data-panel="1">
      <h3 data-i18n="booking.selectDepartment"></h3>
      <div class="grid grid-3" id="department-grid" style="margin-top:16px;"></div>
    </section>

    <!-- Step 2: Doctor -->
    <section class="wizard-panel" data-panel="2" hidden>
      <button class="btn btn-ghost btn-sm" data-back="1" style="margin-bottom:16px;">&larr; <span data-i18n="common.back"></span></button>
      <h3 data-i18n="booking.selectDoctor"></h3>
      <div class="grid grid-2" id="doctor-grid" style="margin-top:16px;"></div>
    </section>

    <!-- Step 3: Date & Time -->
    <section class="wizard-panel" data-panel="3" hidden>
      <button class="btn btn-ghost btn-sm" data-back="2" style="margin-bottom:16px;">&larr; <span data-i18n="common.back"></span></button>
      <h3 data-i18n="booking.selectDateTime"></h3>
      <p class="muted" id="doctor-works-on" style="font-size:0.85rem;"></p>

      <div class="card card-pad" style="margin-top:16px;">
        <div class="field" style="max-width:260px;">
          <label data-i18n="booking.pickDate"></label>
          <input type="date" id="date-input">
        </div>
        <div id="slots-container">
          <label style="display:block; margin-bottom:8px;" data-i18n="booking.availableTimes"></label>
          <div class="time-slot-grid" id="slots-grid"></div>
          <p class="muted" id="slots-empty" hidden data-i18n="booking.noSlots"></p>
        </div>
      </div>

      <div class="row" style="justify-content:flex-end; margin-top:20px;">
        <button class="btn btn-primary" id="to-confirm-btn" disabled data-i18n="common.next"></button>
      </div>
    </section>

    <!-- Step 4: Confirm -->
    <section class="wizard-panel" data-panel="4" hidden>
      <button class="btn btn-ghost btn-sm" data-back="3" style="margin-bottom:16px;">&larr; <span data-i18n="common.back"></span></button>
      <h3 data-i18n="booking.summaryTitle"></h3>

      <div class="ticket" style="margin-top:16px;">
        <div class="ticket-main">
          <div class="ticket-title" id="summary-doctor"></div>
          <div class="ticket-sub" id="summary-department"></div>
          <div class="ticket-sub" id="summary-date"></div>
        </div>
        <div class="ticket-stub">
          <span class="time mono" id="summary-time"></span>
          <span class="date mono" id="summary-day"></span>
        </div>
      </div>

      <div class="field" style="margin-top:20px;">
        <label data-i18n="booking.notesLabel"></label>
        <textarea id="notes-input" data-i18n-placeholder="booking.notesPlaceholder"></textarea>
      </div>

      <div class="form-error" id="confirm-error"></div>

      <button class="btn btn-primary btn-block" id="confirm-btn">
        <span data-i18n="booking.confirmButton"></span>
      </button>
    </section>

    <!-- Step 5: Success -->
    <section class="wizard-panel text-center" data-panel="5" hidden>
      <div class="confirm-check">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="m5 13 4 4L19 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2 data-i18n="booking.successTitle"></h2>
      <p style="max-width:44ch; margin:0 auto 28px;" data-i18n="booking.successSubtitle"></p>
      <div class="row" style="justify-content:center;">
        <a href="my-appointments.html" class="btn btn-primary" data-i18n="booking.viewAppointments"></a>
        <button class="btn btn-ghost" id="book-another-btn" data-i18n="booking.bookAnother"></button>
      </div>
    </section>

  </div>
</main>

<div id="site-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/icons.js"></script>
<script src="assets/js/booking.js"></script>
</body>
</html>
